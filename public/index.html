<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Parser</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap");

      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --bg-deep: #eadcca;
        --paper: rgba(255, 252, 247, 0.9);
        --paper-strong: rgba(255, 249, 242, 0.96);
        --line: rgba(84, 53, 35, 0.12);
        --line-strong: rgba(84, 53, 35, 0.18);
        --ink: #281d16;
        --muted: #6f6056;
        --accent: #be6230;
        --accent-strong: #8d431a;
        --accent-soft: rgba(190, 98, 48, 0.12);
        --sage: #536b57;
        --sage-soft: rgba(83, 107, 87, 0.12);
        --shadow: 0 28px 60px rgba(80, 48, 28, 0.12);
        --shadow-soft: 0 18px 30px rgba(80, 48, 28, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(238, 193, 132, 0.36), transparent 30%),
          radial-gradient(circle at top right, rgba(144, 177, 151, 0.18), transparent 24%),
          radial-gradient(circle at 20% 80%, rgba(190, 98, 48, 0.12), transparent 24%),
          linear-gradient(180deg, #fcf8f2 0%, var(--bg) 52%, #efe4d5 100%);
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.3;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 26px 26px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent 78%);
      }

      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 30px 0 72px;
      }

      .shell-locked {
        pointer-events: none;
        user-select: none;
        filter: blur(3px) saturate(0.92);
      }

      .hero {
        position: relative;
        margin-bottom: 24px;
        padding: 30px;
        border: 1px solid var(--line);
        border-radius: 34px;
        background:
          radial-gradient(circle at top right, rgba(255, 214, 173, 0.34), transparent 28%),
          linear-gradient(135deg, rgba(255, 252, 247, 0.94), rgba(247, 238, 227, 0.84));
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero::before,
      .hero::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        pointer-events: none;
      }

      .hero::before {
        width: 220px;
        height: 220px;
        top: -110px;
        right: -40px;
        background: radial-gradient(circle, rgba(190, 98, 48, 0.18), transparent 68%);
      }

      .hero::after {
        width: 280px;
        height: 280px;
        bottom: -170px;
        left: -110px;
        background: radial-gradient(circle, rgba(83, 107, 87, 0.14), transparent 72%);
      }

      .hero-grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(260px, 0.78fr);
        gap: 24px;
        align-items: start;
      }

      .hero-copy {
        display: grid;
        gap: 18px;
      }

      .eyebrow-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .eyebrow {
        display: inline-block;
        padding: 7px 11px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero-mini-note {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: clamp(2.6rem, 6vw, 5.2rem);
        line-height: 0.92;
        letter-spacing: -0.04em;
        max-width: 10ch;
      }

      .subhead {
        max-width: 60ch;
        margin: 0;
        color: var(--muted);
        font-size: 1.04rem;
        line-height: 1.72;
      }

      .hero-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .hero-pill {
        padding: 9px 13px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid rgba(84, 53, 35, 0.08);
        color: var(--ink);
        font-size: 0.9rem;
        font-weight: 700;
      }

      .hero-note {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 10px;
        padding: 22px;
        border-radius: 26px;
        background: rgba(45, 33, 24, 0.92);
        color: #f6eee5;
        box-shadow: var(--shadow-soft);
      }

      .hero-note-label {
        margin: 0;
        color: rgba(255, 235, 214, 0.7);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .hero-note-title {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: 1.35rem;
        line-height: 1.15;
      }

      .hero-note-body {
        margin: 0;
        color: rgba(246, 238, 229, 0.82);
        line-height: 1.65;
      }

      .hero-metrics {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .metric {
        display: grid;
        gap: 5px;
        padding: 16px 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.56);
        border: 1px solid rgba(84, 53, 35, 0.08);
      }

      .metric strong {
        font-family: "Fraunces", serif;
        font-size: 2rem;
        line-height: 1;
      }

      .metric span {
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(320px, 390px) minmax(0, 1fr);
        gap: 20px;
        align-items: start;
      }

      .panel {
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 30px;
        background: var(--paper);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .panel-heading {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 14px;
        align-items: start;
      }

      .panel-step {
        display: inline-grid;
        place-items: center;
        width: 46px;
        height: 46px;
        border-radius: 16px;
        background:
          linear-gradient(180deg, rgba(190, 98, 48, 0.18), rgba(190, 98, 48, 0.08));
        color: var(--accent-strong);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .panel h2 {
        margin: 0 0 6px;
        font-family: "Fraunces", serif;
        font-size: 1.55rem;
        line-height: 1.08;
        letter-spacing: -0.02em;
      }

      .panel h3 {
        margin: 0 0 12px;
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }

      .upload-box {
        display: grid;
        gap: 16px;
        position: sticky;
        top: 22px;
      }

      .visual-panel {
        display: grid;
        gap: 20px;
      }

      .dropzone {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 300px;
        padding: 20px;
        border: 1.5px dashed rgba(84, 53, 35, 0.18);
        border-radius: 28px;
        background:
          radial-gradient(circle at top right, rgba(255, 222, 193, 0.52), transparent 24%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(244, 234, 221, 0.92));
        overflow: hidden;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .dropzone:hover {
        transform: translateY(-2px);
        border-color: rgba(190, 98, 48, 0.32);
        box-shadow: var(--shadow-soft);
      }

      .dropzone input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .dropzone-copy {
        text-align: center;
        color: var(--muted);
        max-width: 28ch;
        margin: 0 auto;
      }

      .dropzone-copy strong {
        display: block;
        margin-bottom: 10px;
        color: var(--ink);
        font-family: "Fraunces", serif;
        font-size: 1.55rem;
        line-height: 1.08;
      }

      .dropzone-copy span {
        font-size: 0.96rem;
        line-height: 1.65;
      }

      .multi-selection {
        width: 100%;
        display: grid;
        gap: 16px;
      }

      .thumb-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .thumb {
        width: 100%;
        aspect-ratio: 4 / 5;
        border-radius: 16px;
        object-fit: cover;
        background: #fff;
        box-shadow: 0 10px 24px rgba(84, 53, 35, 0.12);
      }

      .file-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
        text-align: left;
      }

      .preview {
        width: 100%;
        height: 100%;
        border-radius: 20px;
        object-fit: contain;
        background: #fff;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease, background 140ms ease, box-shadow 140ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .primary {
        background: linear-gradient(135deg, #cf7440, #a64f22);
        color: white;
        box-shadow: 0 16px 26px rgba(166, 79, 34, 0.22);
      }

      .secondary {
        background: rgba(47, 36, 28, 0.06);
        color: var(--ink);
        border: 1px solid rgba(84, 53, 35, 0.08);
      }

      .status {
        min-height: 30px;
        margin: 0;
        padding: 11px 14px;
        border-radius: 16px;
        background: rgba(83, 107, 87, 0.08);
        color: var(--sage);
        font-size: 0.94rem;
        line-height: 1.5;
      }

      .status.error {
        background: rgba(161, 51, 34, 0.08);
        color: #a13322;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.6;
      }

      .summary-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .summary-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(84, 53, 35, 0.08);
        color: var(--ink);
        font-size: 0.86rem;
        font-weight: 700;
      }

      .cart-panel {
        display: grid;
        gap: 16px;
        padding: 18px;
        border-radius: 26px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(244, 232, 219, 0.92));
        border: 1px solid rgba(84, 53, 35, 0.1);
        box-shadow: var(--shadow-soft);
      }

      .cart-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .cart-panel-label {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .cart-panel h3 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: 1.35rem;
        line-height: 1.08;
      }

      .cart-panel-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .compact-button {
        padding: 10px 14px;
        font-size: 0.9rem;
      }

      .language-order-panel {
        display: grid;
        gap: 14px;
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(84, 53, 35, 0.08);
      }

      .language-toggle {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        width: fit-content;
        color: var(--ink);
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
      }

      .language-toggle input {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
      }

      .speech-tools {
        display: grid;
        gap: 14px;
      }

      .language-search-field {
        display: grid;
        gap: 8px;
      }

      .language-search-field label {
        font-size: 0.88rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .language-search-input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(84, 53, 35, 0.12);
        background: rgba(255, 252, 247, 0.96);
        color: var(--ink);
        font: inherit;
        transition: border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
      }

      .language-search-input:focus {
        outline: none;
        border-color: rgba(190, 98, 48, 0.36);
        box-shadow: 0 0 0 4px rgba(190, 98, 48, 0.12);
      }

      .spoken-order-preview {
        display: grid;
        gap: 8px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(40, 29, 22, 0.04);
        border: 1px solid rgba(84, 53, 35, 0.08);
      }

      .spoken-order-preview p:last-child {
        margin: 0;
        color: var(--ink);
        line-height: 1.65;
      }

      .speech-audio {
        width: 100%;
      }

      .speaking-mode-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          linear-gradient(180deg, rgba(34, 25, 20, 0.56), rgba(34, 25, 20, 0.68));
        backdrop-filter: blur(10px);
      }

      .speaking-mode-card {
        width: min(760px, 100%);
        display: grid;
        gap: 18px;
        padding: 28px;
        border-radius: 30px;
        background:
          radial-gradient(circle at top right, rgba(255, 220, 191, 0.24), transparent 26%),
          linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(247, 238, 228, 0.98));
        border: 1px solid rgba(84, 53, 35, 0.12);
        box-shadow: 0 36px 80px rgba(34, 25, 20, 0.28);
      }

      .speaking-mode-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .speaking-mode-header h2 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        line-height: 0.98;
        letter-spacing: -0.03em;
      }

      .close-speaking-button {
        flex-shrink: 0;
      }

      .speaking-mode-copy {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.72;
        max-width: 58ch;
      }

      .speaking-script {
        background: rgba(255, 255, 255, 0.76);
      }

      .speaking-audio {
        width: 100%;
        min-height: 56px;
      }

      .cart-entry-list {
        display: grid;
        gap: 12px;
      }

      .cart-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(84, 53, 35, 0.08);
      }

      .cart-entry-copy {
        display: grid;
        gap: 4px;
      }

      .cart-entry-copy strong {
        font-size: 1rem;
      }

      .cart-entry-copy span,
      .cart-entry-copy small {
        color: var(--muted);
      }

      .cart-entry-copy span {
        font-size: 0.84rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .cart-entry-copy small {
        font-size: 0.88rem;
        font-weight: 700;
      }

      .menu-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
        gap: 20px;
      }

      .menu-card {
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 237, 227, 0.98));
        border: 1px solid rgba(84, 53, 35, 0.1);
        box-shadow: 0 20px 36px rgba(84, 53, 35, 0.09);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .menu-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 24px 42px rgba(84, 53, 35, 0.14);
      }

      .menu-card-image-shell,
      .menu-card-placeholder {
        aspect-ratio: 4 / 3;
        background: linear-gradient(180deg, #e6d2bf, #f4e8db);
        position: relative;
      }

      .menu-card-image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .menu-card-image-shell::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 80px;
        background: linear-gradient(180deg, transparent, rgba(31, 22, 17, 0.32));
        pointer-events: none;
      }

      .image-source-pill {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 1;
        padding: 8px 11px;
        border-radius: 999px;
        background: rgba(34, 26, 20, 0.72);
        color: #fff2e4;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .menu-card-placeholder {
        display: grid;
        place-items: center;
        gap: 12px;
      }

      .menu-card-placeholder span {
        width: 78px;
        height: 78px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--accent-strong);
        font-size: 1.95rem;
        font-weight: 800;
      }

      .menu-card-placeholder small {
        color: rgba(40, 29, 22, 0.62);
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .menu-card-body {
        display: grid;
        gap: 14px;
        padding: 20px;
      }

      .menu-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .menu-card-header h3 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: 1.45rem;
        line-height: 1.02;
        letter-spacing: -0.03em;
      }

      .menu-card-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .price-pill {
        flex-shrink: 0;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(190, 98, 48, 0.1);
        color: var(--accent-strong);
        font-size: 0.98rem;
        font-weight: 800;
      }

      .menu-card-description {
        margin: 0;
        color: var(--ink);
        font-size: 1rem;
        line-height: 1.72;
      }

      .menu-card-cart-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .cart-add-button {
        padding-inline: 16px;
      }

      .cart-inline-note {
        color: var(--muted);
        font-size: 0.86rem;
        font-weight: 700;
      }

      .quantity-stepper {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 6px;
        border-radius: 999px;
        background: rgba(40, 29, 22, 0.06);
        border: 1px solid rgba(84, 53, 35, 0.08);
      }

      .compact-stepper {
        flex-shrink: 0;
      }

      .quantity-button {
        width: 34px;
        height: 34px;
        display: inline-grid;
        place-items: center;
        padding: 0;
        border-radius: 999px;
        background: #fff9f3;
        color: var(--ink);
        box-shadow: none;
      }

      .quantity-value {
        min-width: 18px;
        text-align: center;
        font-weight: 800;
      }

      .photo-credit,
      .pexels-credit a {
        color: var(--accent-strong);
        font-size: 0.86rem;
        text-decoration: none;
        line-height: 1.5;
      }

      .photo-credit:hover,
      .pexels-credit a:hover {
        text-decoration: underline;
      }

      .muted-credit {
        margin: 0;
        color: var(--muted);
      }

      .empty-menu-state {
        display: grid;
        gap: 10px;
        padding: 24px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(247, 239, 230, 0.94));
        border: 1px solid rgba(84, 53, 35, 0.1);
      }

      .empty-menu-state span {
        color: var(--muted);
        line-height: 1.5;
      }

      .pexels-credit {
        margin: 0;
      }

      .debug-block {
        border-top: 1px solid rgba(84, 53, 35, 0.1);
        padding-top: 16px;
      }

      .debug-block summary {
        cursor: pointer;
