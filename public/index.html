<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Parser</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f1e8;
        --panel: rgba(255, 252, 247, 0.92);
        --panel-border: rgba(83, 50, 27, 0.14);
        --ink: #2f241c;
        --muted: #756457;
        --accent: #d66b2c;
        --accent-strong: #b6531c;
        --shadow: 0 20px 45px rgba(91, 57, 36, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(239, 182, 113, 0.24), transparent 34%),
          radial-gradient(circle at right, rgba(183, 104, 63, 0.18), transparent 28%),
          linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      }

      .shell {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0 64px;
      }

      .hero {
        margin-bottom: 28px;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(214, 107, 44, 0.12);
        color: var(--accent-strong);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(2.2rem, 6vw, 4.5rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .subhead {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .panel {
        padding: 22px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 1rem;
        letter-spacing: 0.02em;
      }

      .panel h3 {
        margin: 0 0 12px;
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }

      .upload-box {
        display: grid;
        gap: 16px;
      }

      .visual-panel {
        display: grid;
        gap: 18px;
      }

      .dropzone {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 260px;
        padding: 18px;
        border: 1.5px dashed rgba(83, 50, 27, 0.18);
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(248, 239, 228, 0.9));
        overflow: hidden;
      }

      .dropzone input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .dropzone-copy {
        text-align: center;
        color: var(--muted);
      }

      .dropzone-copy strong {
        display: block;
        margin-bottom: 8px;
        color: var(--ink);
        font-size: 1.1rem;
      }

      .multi-selection {
        width: 100%;
        display: grid;
        gap: 16px;
      }

      .thumb-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .thumb {
        width: 100%;
        aspect-ratio: 4 / 5;
        border-radius: 14px;
        object-fit: cover;
        background: #fff;
      }

      .file-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
        text-align: left;
      }

      .preview {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        object-fit: contain;
        background: #fff;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease, background 140ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .secondary {
        background: rgba(47, 36, 28, 0.08);
        color: var(--ink);
      }

      .status {
        min-height: 24px;
        margin: 0;
        color: var(--muted);
        font-size: 0.96rem;
      }

      .status.error {
        color: #a13322;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .menu-card-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .menu-card {
        overflow: hidden;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(248, 239, 228, 0.96));
        border: 1px solid rgba(83, 50, 27, 0.12);
        box-shadow: 0 12px 28px rgba(91, 57, 36, 0.09);
      }

      .menu-card-image-shell,
      .menu-card-placeholder {
        aspect-ratio: 4 / 3;
        background: linear-gradient(180deg, #ead9c8, #f4e9dd);
      }

      .menu-card-image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .menu-card-placeholder {
        display: grid;
        place-items: center;
      }

      .menu-card-placeholder span {
        width: 72px;
        height: 72px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--accent-strong);
        font-size: 1.8rem;
        font-weight: 800;
      }

      .menu-card-body {
        display: grid;
        gap: 12px;
        padding: 18px;
      }

      .menu-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .menu-card-header h3 {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.25;
      }

      .menu-card-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .price-pill {
        flex-shrink: 0;
        padding: 8px 11px;
        border-radius: 999px;
        background: rgba(214, 107, 44, 0.12);
        color: var(--accent-strong);
        font-size: 0.9rem;
        font-weight: 800;
      }

      .menu-card-description {
        margin: 0;
        color: var(--ink);
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .photo-credit,
      .pexels-credit a {
        color: var(--accent-strong);
        font-size: 0.88rem;
        text-decoration: none;
      }

      .photo-credit:hover,
      .pexels-credit a:hover {
        text-decoration: underline;
      }

      .muted-credit {
        margin: 0;
        color: var(--muted);
      }

      .empty-menu-state {
        display: grid;
        gap: 8px;
        padding: 20px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(248, 239, 228, 0.9));
        border: 1px solid rgba(83, 50, 27, 0.12);
      }

      .empty-menu-state span {
        color: var(--muted);
        line-height: 1.5;
      }

      .pexels-credit {
        margin: 0;
      }

      .debug-block {
        border-top: 1px solid rgba(83, 50, 27, 0.12);
        padding-top: 14px;
      }

      .debug-block summary {
        cursor: pointer;
        font-weight: 700;
      }

      .compact-pre {
        margin-top: 12px;
        min-height: 0;
        max-height: 360px;
      }

      pre {
        margin: 0;
        min-height: 380px;
        max-height: 620px;
        overflow: auto;
        padding: 18px;
        border-radius: 22px;
        background: #201913;
        color: #f7ede2;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .menu-card-grid {
          grid-template-columns: 1fr;
        }

        .thumb-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .shell {
          padding-top: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
